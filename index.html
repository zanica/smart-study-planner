<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Study Planner</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="navbar">
 <h1>Smart Study Planner</h1>

 <nav>
   <a href="index.html">Dashboard</a>
   <a href="add-task.html">Add Task</a>
   <a href="tasks.html">Tasks</a>
   <a href="about.html">About</a>
 </nav>
</header>

<main class="container">

<h2>Dashboard</h2>

<div class="dashboard-grid">

  <div class="card">
    <h3>🏆 Points</h3>
    <p id="points">0 pts</p>
  </div>

  <div class="card">
    <h3>📊 Level</h3>
    <p id="level">Beginner</p>
  </div>

  <div class="card">
    <h3>🔥 Streak</h3>
    <p id="streak">0</p>
  </div>


  <div class="card">
   <p><strong>Task Progress</strong></p>

   <div class="progress-bar">
     <div id="progress">0%</div>
   </div>
   
    <div class="task-content"></div>
  </div>
</div>

<div class="home-buttons">
  <a href="add-task.html" class="btn">➕ Add Task</a>
  <a href="tasks.html" class="btn">📋 View Tasks</a>
</div>

<div class="quote-box">
  <p id="quote">Stay motivated...</p>
</div>

</main>

<script src="script.js"></script>

</body>
</html>
